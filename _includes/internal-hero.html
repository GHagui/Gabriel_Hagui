<section class="inner-hero inner-hero-{{ page.section }}" aria-labelledby="inner-page-title">
  <div class="inner-shell inner-hero-inner">
    <div class="inner-hero-copy">
      <p class="inner-kicker">{{ page.eyebrow }}</p>
      <h1 id="inner-page-title">{{ page.heading | default: page.title }}</h1>
      <p>{{ page.intro | default: page.description }}</p>
    </div>
    <div class="inner-hero-marker" aria-hidden="true">
      <span>{{ page.marker_label }}</span>
      <strong>{{ page.marker_value }}</strong>
    </div>
  </div>
</section>
