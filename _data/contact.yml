pt_br:
  section_title: "Escolha o canal"
  section_intro: "Cada canal tem uma finalidade diferente. Use o que fizer mais sentido para a conversa."
  note_title: "Comunicação clara funciona melhor."
  note_text: "Por ser surdo, prefiro começar conversas por texto. Isso me permite responder com contexto, manter referências organizadas e evitar perda de informação."
  channels:
    - icon: "email"
      label: "E-mail"
      handle: "gabriel.hagui@gmail.com"
      href: "mailto:gabriel.hagui@gmail.com"
      text: "Mensagens mais detalhadas, dúvidas e colaborações."
      action: "Enviar e-mail"
    - icon: "github"
      label: "GitHub"
      handle: "@GHagui"
      href: "https://github.com/GHagui"
      text: "Código aberto, estudos, issues e experimentos técnicos."
      action: "Abrir GitHub"
      external: true
    - icon: "telegram"
      label: "Telegram"
      handle: "@g_hagui"
      href: "https://t.me/g_hagui"
      text: "Mensagens curtas e conversas diretas por texto."
      action: "Abrir Telegram"
      external: true
    - icon: "linkedin"
      label: "LinkedIn"
      handle: "/gabriel-hagui"
      href: "https://www.linkedin.com/in/gabriel-hagui"
      text: "Trajetória profissional e conexões da área de tecnologia."
      action: "Abrir LinkedIn"
      external: true
en_us:
  section_title: "Choose a channel"
  section_intro: "Each channel serves a different purpose. Use whichever fits the conversation best."
  note_title: "Clear communication works best."
  note_text: "As a deaf person, I prefer to start conversations in writing. It lets me respond with context, keep references organized and avoid losing information."
  channels:
    - icon: "email"
      label: "Email"
      handle: "gabriel.hagui@gmail.com"
      href: "mailto:gabriel.hagui@gmail.com"
      text: "Detailed messages, questions and collaborations."
